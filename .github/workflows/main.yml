name: Android Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu' # Options: zulu, temurin, adopt, etc.
        java-version: '17'
        cache: 'gradle' # Automatically caches Gradle dependencies

    - name: Grant Execute Permission for Gradlew
      run: chmod +x ./gradlew

    # Optional: Run Lint and Unit Tests before building
    - name: Run Tests
      run: ./gradlew testDebugUnitTest

    # To build a universal testing APK, use 'assembleDebug'
    # To build a production App Bundle, use 'bundleRelease'
    name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        
